<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>地牢幸存者 · 肉鸽小游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body {
    height: 100%;
    background: #0a0a12;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
    color: #e8e8f0;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    background: #11111c;
    touch-action: none;
    image-rendering: auto;
  }
  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    pointer-events: none;
    display: flex; flex-direction: column; gap: 6px;
  }
  .bar-bg {
    width: 100%; height: 16px; background: #1d1d2e;
    border: 1px solid #33334d; border-radius: 8px; overflow: hidden;
    position: relative;
  }
  .bar-fill { height: 100%; transition: width .12s linear; }
  #xpFill { background: linear-gradient(90deg,#3aa0ff,#7ad3ff); }
  #hpRow { display:flex; align-items:center; gap:8px; }
  #hpBg { flex:1; height: 14px; background:#2a1414; border:1px solid #5a2a2a; border-radius:7px; overflow:hidden;}
  #hpFill { height:100%; background: linear-gradient(90deg,#ff4d5e,#ff8a96); transition: width .12s linear;}
  #topRow { display:flex; align-items:center; gap:12px; font-size: 13px; font-weight:600; }
  #lvlTag { color:#7ad3ff; }
  #timeTag { color:#ffd86b; }
  #killTag { color:#ff8a96; }
  .hudLabel { font-size:11px; color:#8a8aa8; }

  /* Overlay screens */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(8,8,16,.86);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 18px;
    z-index: 10;
  }
  .hidden { display: none !important; }
  h1 { font-size: 34px; letter-spacing: 2px; color:#7ad3ff; text-shadow:0 0 20px rgba(122,211,255,.4);}
  h2 { font-size: 24px; color:#ffd86b; }
  p.sub { color:#9a9ac0; font-size:14px; line-height:1.6; max-width:340px;}
  .btn {
    pointer-events: auto;
    background: linear-gradient(180deg,#3aa0ff,#2563c9);
    color:#fff; border:none; border-radius: 12px;
    padding: 14px 34px; font-size: 18px; font-weight:700;
    cursor:pointer; box-shadow:0 6px 20px rgba(58,160,255,.35);
    transition: transform .08s;
  }
  .btn:active { transform: scale(.96); }
  /* Upgrade cards */
  #cards { display:flex; flex-direction:column; gap:14px; width:100%; max-width: 360px; }
  .card {
    pointer-events:auto;
    background: linear-gradient(180deg,#1b1b2c,#15151f);
    border:1px solid #33334d; border-radius:14px;
    padding:16px 18px; text-align:left; cursor:pointer;
    display:flex; align-items:center; gap:14px;
    transition: transform .08s, border-color .15s;
  }
  .card:active { transform: scale(.97); }
  .card:hover { border-color:#3aa0ff; }
  .card .ico { font-size: 30px; width:44px; text-align:center;}
  .card .txt h3 { font-size:16px; color:#e8e8f0; margin-bottom:3px;}
  .card .txt span { font-size:12.5px; color:#9a9ac0; }
  .lvlbadge{ font-size:11px; color:#ffd86b; }
  #joyHint { position:absolute; bottom:16px; left:0; right:0; text-align:center; font-size:12px; color:#55556e; pointer-events:none;}
  #pauseBtn {
    position:absolute; top:46px; right:14px; z-index:5;
    width:44px; height:44px; border-radius:12px;
    background:rgba(27,27,44,.8); border:1px solid #33334d;
    color:#e8e8f0; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter: blur(4px);
  }
  #pauseBtn:active { transform:scale(.92); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="bar-bg"><div id="xpFill" class="bar-fill" style="width:0%"></div></div>
    <div id="topRow">
      <span id="lvlTag">Lv 1</span>
      <span id="timeTag">00:00</span>
      <span id="killTag">击杀 0</span>
    </div>
    <div id="hpRow"><span class="hudLabel">HP</span><div id="hpBg"><div id="hpFill" style="width:100%"></div></div></div>
  </div>

  <!-- Start screen -->
  <div id="startScreen" class="overlay">
    <h1>地牢幸存者</h1>
    <p class="sub">在无尽的地牢中活下去。自动攻击逼近的怪物，吃掉它们掉落的经验晶石升级，每次升级三选一变得更强。<br><br>电脑：<b>WASD / 方向键</b> 移动<br>手机：屏幕上<b>拖动</b>移动</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>

  <!-- Pause button -->
  <button id="pauseBtn" class="hidden">⏸</button>

  <!-- Pause screen -->
  <div id="pauseScreen" class="overlay hidden">
    <h2 style="color:#7ad3ff">⏸ 已暂停</h2>
    <p class="sub">休息一下～</p>
    <button class="btn" id="resumeBtn">继续游戏</button>
    <button class="btn" id="quitBtn" style="background:linear-gradient(180deg,#444,#2a2a3a);box-shadow:none;font-size:15px;padding:10px 24px">放弃本局</button>
  </div>

  <!-- Level up screen -->
  <div id="levelScreen" class="overlay hidden">
    <h2>⬆ 升级！选择强化</h2>
    <div id="cards"></div>
  </div>

  <!-- Game over -->
  <div id="overScreen" class="overlay hidden">
    <h1 style="color:#ff8a96">你倒下了</h1>
    <p class="sub" id="overStats"></p>
    <button class="btn" id="retryBtn">再来一局</button>
  </div>

  <div id="joyHint" class="hidden">移动靠拢吃晶石 · 远离红色精英怪</div>
</div>

<script>
(() => {
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

// ---------- assets ----------
const heroImg = new Image();
let heroReady=false;
heroImg.onload=()=>{ heroReady=true; };
heroImg.src='hero.png';
const HERO_FRAMES=4, HERO_FW=300, HERO_FH=300;

const grubImg = new Image();
let grubReady=false;
grubImg.onload=()=>{ grubReady=true; };
grubImg.src='grub.png';
const GRUB_FRAMES=4, GRUB_FW=300, GRUB_FH=300;

const runnerImg = new Image();
let runnerReady=false;
runnerImg.onload=()=>{ runnerReady=true; };
runnerImg.src='runner.png';
const RUN_FRAMES=4, RUN_FW=300, RUN_FH=300;

// ---------- helpers ----------
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b));
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

// ---------- game state ----------
let game=null;
function newGame(){
  return {
    t:0, running:true, paused:false,
    player:{ x:0,y:0, r:13, speed:3.0, hp:120, maxhp:120, xp:0, lvl:1, next:5, kills:0,
             ifr:0, face:1, anim:0, frame:0, moving:false },
    cam:{x:0,y:0},
    enemies:[], bullets:[], orbs:[], particles:[], damageTexts:[],
    spawnTimer:0, spawnInterval:95,
    // weapons / stats
    weapons:{
      bolt:{ lvl:1, cd:0, rate:34, dmg:22, count:1, speed:6.5, pierce:0 }, // auto magic bolt
      orbit:{ lvl:0, ang:0, dmg:14, count:0, radius:60, size:11 },       // orbiting blades
      nova:{ lvl:0, cd:0, rate:160, dmg:26, radius:90 }                  // shockwave
    },
    stats:{ pickup:60, regen:0, dmgMul:1, hpRegenT:0 },
    flash:0,
  };
}

// ---------- input ----------
const keys={};
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='p'||k==='escape'){ togglePause(); return; }
  keys[k]=true;
});
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
// touch drag joystick (relative)
let touchActive=false, touchVec={x:0,y:0};
function setTouch(e){
  const t=e.touches?e.touches[0]:e;
  // direction from screen center-ish: use delta from start
  if(touchStart){
    let dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    const m=Math.hypot(dx,dy)||1;
    const mag=clamp(m/40,0,1);
    touchVec.x=dx/m*mag; touchVec.y=dy/m*mag;
  }
}
let touchStart=null;
cv.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.touches[0]; touchStart={x:t.clientX,y:t.clientY}; touchActive=true; setTouch(e);},{passive:false});
cv.addEventListener('touchmove',e=>{ e.preventDefault(); setTouch(e);},{passive:false});
cv.addEventListener('touchend',e=>{ e.preventDefault(); touchActive=false; touchVec.x=0;touchVec.y=0; touchStart=null;},{passive:false});

// ---------- spawning ----------
function spawnEnemy(){
  const g=game, p=g.player;
  const ang=Math.random()*Math.PI*2;
  const d=Math.max(W,H)*0.65+rand(40,160);
  const x=p.x+Math.cos(ang)*d, y=p.y+Math.sin(ang)*d;
  const min=g.t/3600; // minutes
  // enemy tiers scale with time
  let type='grub';
  const roll=Math.random();
  if(min>1.5 && roll<0.16) type='runner';
  if(min>3 && roll>0.9) type='brute';
  let e;
  const hpScale=1+min*0.32;
  if(type==='grub')   e={x,y,r:12,hp:22*hpScale,maxhp:22*hpScale,speed:rand(0.9,1.2),dmg:6,xp:1,color:'#7ad36b',type};
  if(type==='runner') e={x,y,r:10,hp:15*hpScale,maxhp:15*hpScale,speed:rand(1.9,2.3),dmg:5,xp:1,color:'#ffd86b',type};
  if(type==='brute')  e={x,y,r:20,hp:80*hpScale,maxhp:80*hpScale,speed:rand(0.75,0.95),dmg:12,xp:4,color:'#ff6b8a',type};
  e.kb={x:0,y:0};
  e.anim=rand(0,GRUB_FRAMES); e.face=1;
  if(type==='grub') e.green=Math.random()<0.5;   // randomly purple or green grub
  g.enemies.push(e);
}

// ---------- weapons fire ----------
function fireBolt(){
  const g=game,p=p0(),w=g.weapons.bolt;
  // target nearest enemy
  let near=null,nd=1e9;
  for(const e of g.enemies){const d=dist(p.x,p.y,e.x,e.y); if(d<nd){nd=d;near=e;}}
  let baseAng = near?Math.atan2(near.y-p.y,near.x-p.x):rand(0,Math.PI*2);
  for(let i=0;i<w.count;i++){
    const spread=(i-(w.count-1)/2)*0.22;
    const a=baseAng+spread;
    g.bullets.push({x:p.x,y:p.y,vx:Math.cos(a)*w.speed,vy:Math.sin(a)*w.speed,
      r:6,dmg:w.dmg*g.stats.dmgMul,life:90,pierce:w.pierce});
  }
}
function p0(){return game.player;}

function fireNova(){
  const g=game,p=p0(),w=g.weapons.nova;
  for(const e of g.enemies){
    if(dist(p.x,p.y,e.x,e.y)<w.radius){
      hitEnemy(e, w.dmg*g.stats.dmgMul, e.x-p.x, e.y-p.y, 6);
    }
  }
  // ring particles
  for(let i=0;i<22;i++){const a=i/22*Math.PI*2;
    g.particles.push({x:p.x,y:p.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:18,max:18,col:'#7ad3ff',r:4});}
}

function hitEnemy(e,dmg,kx,ky,kmag){
  e.hp-=dmg;
  const m=Math.hypot(kx,ky)||1;
  e.kb.x+=kx/m*(kmag||3); e.kb.y+=ky/m*(kmag||3);
  game.damageTexts.push({x:e.x,y:e.y-e.r,txt:Math.round(dmg),life:30,vy:-0.8});
  for(let i=0;i<3;i++)game.particles.push({x:e.x,y:e.y,vx:rand(-2,2),vy:rand(-2,2),life:12,max:12,col:e.color,r:3});
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  e.dead=true;
  game.player.kills++;
  game.orbs.push({x:e.x,y:e.y,xp:e.xp,r:5});
  for(let i=0;i<8;i++)game.particles.push({x:e.x,y:e.y,vx:rand(-3,3),vy:rand(-3,3),life:20,max:20,col:e.color,r:3});
}

// ---------- update ----------
function update(){
  const g=game; if(!g||!g.running||g.paused) return;
  g.t++;
  const p=g.player;

  // movement input
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(touchActive){mx=touchVec.x;my=touchVec.y;}
  const ml=Math.hypot(mx,my);
  if(ml>0){mx/=ml||1;my/=ml||1; if(ml<1&&touchActive){mx*=ml;my*=ml;}}
  p.x+=mx*p.speed; p.y+=my*p.speed;
  // facing + walk animation
  p.moving=ml>0.05;
  if(mx<-0.05)p.face=1; else if(mx>0.05)p.face=-1;   // sprite faces this way by default
  if(p.moving){ p.anim+=0.22; p.frame=Math.floor(p.anim)%HERO_FRAMES; }
  else { p.frame=0; }                                 // idle: hold static first frame

  // camera
  g.cam.x=p.x; g.cam.y=p.y;

  // regen
  if(g.stats.regen>0){ g.stats.hpRegenT++; if(g.stats.hpRegenT>=60){g.stats.hpRegenT=0; p.hp=Math.min(p.maxhp,p.hp+g.stats.regen);} }
  if(p.ifr>0)p.ifr--;

  // spawning
  g.spawnTimer++;
  const interval=Math.max(26, g.spawnInterval - Math.floor(g.t/900)*5);
  if(g.spawnTimer>=interval){ g.spawnTimer=0;
    const burst=1+Math.floor(g.t/3600);
    for(let i=0;i<burst;i++)spawnEnemy();
  }

  // weapons cooldowns
  const wb=g.weapons.bolt; wb.cd++; if(wb.cd>=wb.rate){wb.cd=0; fireBolt();}
  const wn=g.weapons.nova; if(wn.lvl>0){wn.cd++; if(wn.cd>=wn.rate){wn.cd=0; fireNova();}}
  const wo=g.weapons.orbit; if(wo.count>0){ wo.ang+=0.06; }

  // bullets
  for(const b of g.bullets){
    b.x+=b.vx;b.y+=b.vy;b.life--;
    for(const e of g.enemies){
      if(e.dead)continue;
      if(dist(b.x,b.y,e.x,e.y)<e.r+b.r){
        hitEnemy(e,b.dmg,b.vx,b.vy,4);
        if(b.pierce>0){b.pierce--;}else{b.life=0;}
        break;
      }
    }
  }
  g.bullets=g.bullets.filter(b=>b.life>0);

  // orbit blades damage
  if(wo.count>0){
    for(let i=0;i<wo.count;i++){
      const a=wo.ang+i/wo.count*Math.PI*2;
      const ox=p.x+Math.cos(a)*wo.radius, oy=p.y+Math.sin(a)*wo.radius;
      for(const e of g.enemies){
        if(e.dead)continue;
        if(dist(ox,oy,e.x,e.y)<e.r+wo.size){
          if(!e.obCd||e.obCd<=0){ hitEnemy(e,wo.dmg*g.stats.dmgMul,e.x-p.x,e.y-p.y,5); e.obCd=18; }
        }
      }
    }
  }

  // enemies
  for(const e of g.enemies){
    if(e.dead)continue;
    if(e.obCd>0)e.obCd--;
    const a=Math.atan2(p.y-e.y,p.x-e.x);
    e.x+=Math.cos(a)*e.speed + e.kb.x;
    e.y+=Math.sin(a)*e.speed + e.kb.y;
    e.kb.x*=0.8; e.kb.y*=0.8;
    e.anim+=0.15; if(Math.cos(a)<-0.05)e.face=-1; else if(Math.cos(a)>0.05)e.face=1;
    // touch player
    if(p.ifr<=0 && dist(e.x,e.y,p.x,p.y)<e.r+p.r){
      p.hp-=e.dmg; p.ifr=42; g.flash=8;
      for(let i=0;i<6;i++)g.particles.push({x:p.x,y:p.y,vx:rand(-3,3),vy:rand(-3,3),life:16,max:16,col:'#ff4d5e',r:3});
      if(p.hp<=0){ p.hp=0; gameOver(); }
    }
  }
  g.enemies=g.enemies.filter(e=>!e.dead);

  // orbs pickup
  for(const o of g.orbs){
    const d=dist(o.x,o.y,p.x,p.y);
    if(d<g.stats.pickup){ const a=Math.atan2(p.y-o.y,p.x-o.x); const pull=clamp((g.stats.pickup-d)/g.stats.pickup,0,1)*6+1; o.x+=Math.cos(a)*pull; o.y+=Math.sin(a)*pull; }
    if(d<p.r+o.r){ o.got=true; p.xp+=o.xp;
      for(let i=0;i<4;i++)g.particles.push({x:o.x,y:o.y,vx:rand(-2,2),vy:rand(-2,2),life:14,max:14,col:'#7ad3ff',r:2});
      if(p.xp>=p.next){ levelUp(); }
    }
  }
  g.orbs=g.orbs.filter(o=>!o.got);

  // particles & texts
  for(const pt of g.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.92;pt.vy*=0.92;pt.life--;}
  g.particles=g.particles.filter(pt=>pt.life>0);
  for(const d of g.damageTexts){d.y+=d.vy;d.life--;}
  g.damageTexts=g.damageTexts.filter(d=>d.life>0);
  if(g.flash>0)g.flash--;

  updateHUD();
}

function levelUp(){
  const g=game,p=g.player;
  p.xp-=p.next; p.lvl++;
  p.next=Math.floor(p.next*1.45+3);
  g.paused=true;
  showUpgrades();
}

// ---------- upgrades ----------
function upgradePool(){
  const g=game,w=g.weapons,s=g.stats;
  const pool=[];
  pool.push({ico:'🔮',name:'魔弹强化',desc:()=> w.bolt.count<5?'多发射一枚魔弹':'魔弹伤害+8',
    lvl:w.bolt.lvl,apply:()=>{ if(w.bolt.count<5)w.bolt.count++; else w.bolt.dmg+=8; w.bolt.lvl++; }});
  pool.push({ico:'⚡',name:'急速施法',desc:()=>'魔弹冷却 -15%',lvl:'',apply:()=>{ w.bolt.rate=Math.max(12,Math.round(w.bolt.rate*0.85)); }});
  pool.push({ico:'🗡️',name:'环绕飞刃',desc:()=> w.orbit.count===0?'获得1把环绕飞刃':'增加1把飞刃 / 伤害+6',
    lvl:w.orbit.lvl,apply:()=>{ w.orbit.count++; w.orbit.dmg+=6; w.orbit.lvl++; }});
  pool.push({ico:'💥',name:'冲击波',desc:()=> w.nova.lvl===0?'周期性震退周围敌人':'冲击波范围+20 伤害+12',
    lvl:w.nova.lvl,apply:()=>{ if(w.nova.lvl===0)w.nova.lvl=1; else {w.nova.radius+=20;w.nova.dmg+=12;} w.nova.lvl++; w.nova.rate=Math.max(70,w.nova.rate-10);}});
  pool.push({ico:'❤️',name:'强健体魄',desc:()=>'最大生命+25 并回满',lvl:'',apply:()=>{ p0().maxhp+=25; p0().hp=p0().maxhp; }});
  pool.push({ico:'🥾',name:'轻盈步伐',desc:()=>'移动速度+12%',lvl:'',apply:()=>{ p0().speed*=1.12; }});
  pool.push({ico:'🧲',name:'磁力拾取',desc:()=>'晶石拾取范围+40',lvl:'',apply:()=>{ g.stats.pickup+=40; }});
  pool.push({ico:'✨',name:'力量灌注',desc:()=>'全武器伤害+12%',lvl:'',apply:()=>{ g.stats.dmgMul*=1.12; }});
  pool.push({ico:'🌿',name:'生命恢复',desc:()=>'每秒回复+1.5 生命',lvl:'',apply:()=>{ g.stats.regen+=1.5; }});
  return pool;
}
function showUpgrades(){
  const pool=upgradePool();
  // pick 3 random distinct
  const picks=[];
  const copy=pool.slice();
  for(let i=0;i<3 && copy.length;i++){ picks.push(copy.splice(randi(0,copy.length),1)[0]); }
  const cards=document.getElementById('cards'); cards.innerHTML='';
  for(const u of picks){
    const el=document.createElement('div'); el.className='card';
    const lvlTxt = (u.lvl!=='' && u.lvl!=null && u.lvl>0)?`<span class="lvlbadge"> · Lv ${u.lvl}</span>`:'';
    el.innerHTML=`<div class="ico">${u.ico}</div><div class="txt"><h3>${u.name}${lvlTxt}</h3><span>${u.desc()}</span></div>`;
    el.onclick=()=>{ u.apply(); document.getElementById('levelScreen').classList.add('hidden'); game.paused=false; };
    cards.appendChild(el);
  }
  document.getElementById('levelScreen').classList.remove('hidden');
}

// ---------- render ----------
function draw(){
  const g=game; if(!g)return;
  ctx.clearRect(0,0,W,H);
  const ox=W/2-g.cam.x, oy=H/2-g.cam.y;

  // grid floor
  ctx.save();
  ctx.translate(ox,oy);
  const grid=64;
  const startX=Math.floor((g.cam.x-W/2)/grid)*grid;
  const startY=Math.floor((g.cam.y-H/2)/grid)*grid;
  ctx.strokeStyle='#1a1a2a'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=startX;x<g.cam.x+W/2+grid;x+=grid){ctx.moveTo(x,g.cam.y-H/2);ctx.lineTo(x,g.cam.y+H/2);}
  for(let y=startY;y<g.cam.y+H/2+grid;y+=grid){ctx.moveTo(g.cam.x-W/2,y);ctx.lineTo(g.cam.x+W/2,y);}
  ctx.stroke();

  // orbs
  for(const o of g.orbs){
    ctx.fillStyle='#7ad3ff'; ctx.shadowColor='#7ad3ff'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,7); ctx.fill();
  }
  ctx.shadowBlur=0;

  // enemies
  for(const e of g.enemies){
    const gimg = e.green?runnerImg:grubImg;
    const gready = e.green?runnerReady:grubReady;
    if(e.type==='grub' && gready){
      const disp=73;                     // 140% sprite size
      const fr=Math.floor(e.anim)%GRUB_FRAMES;
      ctx.save();
      ctx.imageSmoothingEnabled=false;
      ctx.translate(e.x,e.y); ctx.scale(e.face,1);
      ctx.drawImage(gimg, fr*GRUB_FW,0,GRUB_FW,GRUB_FH, -disp/2,-disp/2, disp,disp);
      ctx.restore();
    } else {
      ctx.fillStyle=e.color;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,7); ctx.fill();
      // eyes
      ctx.fillStyle='#11111c';
      ctx.beginPath();ctx.arc(e.x-e.r*0.3,e.y-2,e.r*0.16,0,7);ctx.arc(e.x+e.r*0.3,e.y-2,e.r*0.16,0,7);ctx.fill();
    }
    // hp bar
    if(e.hp<e.maxhp){
      ctx.fillStyle='#000'; ctx.fillRect(e.x-e.r,e.y-e.r-7,e.r*2,3);
      ctx.fillStyle='#ff8a96'; ctx.fillRect(e.x-e.r,e.y-e.r-7,e.r*2*(e.hp/e.maxhp),3);
    }
  }

  // bullets (with outer glow)
  ctx.shadowColor='#7ad3ff'; ctx.shadowBlur=16;
  for(const b of g.bullets){
    // soft outer halo
    ctx.globalAlpha=0.35; ctx.fillStyle='#7ad3ff';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r+5,0,7);ctx.fill();
    // bright core
    ctx.globalAlpha=1; ctx.fillStyle='#e6f6ff';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  // orbit blades
  const wo=g.weapons.orbit, p=g.player;
  if(wo.count>0){
    for(let i=0;i<wo.count;i++){
      const a=wo.ang+i/wo.count*Math.PI*2;
      const bx=p.x+Math.cos(a)*wo.radius, by=p.y+Math.sin(a)*wo.radius;
      ctx.fillStyle='#dfe6ff'; ctx.shadowColor='#aab8ff'; ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(bx,by,wo.size,0,7);ctx.fill();
    }
    ctx.shadowBlur=0;
  }

  // nova ring indicator
  const wn=g.weapons.nova;
  if(wn.lvl>0){
    const prog=wn.cd/wn.rate;
    ctx.strokeStyle='rgba(122,211,255,'+(0.1+0.2*prog)+')'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(p.x,p.y,wn.radius,0,7);ctx.stroke();
  }

  // player
  ctx.save();
  if(p.ifr>0 && Math.floor(p.ifr/4)%2===0) ctx.globalAlpha=0.45;
  if(heroReady){
    const disp=104;                      // on-screen sprite size (200%)
    const bob=p.moving?Math.sin(p.anim*Math.PI)*1.5:0;
    ctx.imageSmoothingEnabled=false;     // crisp pixels
    ctx.translate(p.x, p.y+bob);
    ctx.scale(p.face,1);                 // mirror for left/right
    ctx.drawImage(heroImg, p.frame*HERO_FW,0,HERO_FW,HERO_FH, -disp/2,-disp/2, disp,disp);
  } else {
    ctx.fillStyle='#7ad3ff'; ctx.shadowColor='#3aa0ff'; ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#11111c';
    ctx.beginPath();ctx.arc(p.x-4,p.y-2,2.4,0,7);ctx.arc(p.x+4,p.y-2,2.4,0,7);ctx.fill();
  }
  ctx.restore();

  // particles
  for(const pt of g.particles){
    ctx.globalAlpha=pt.life/pt.max; ctx.fillStyle=pt.col;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;

  // damage texts
  ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  for(const d of g.damageTexts){
    ctx.globalAlpha=clamp(d.life/30,0,1); ctx.fillStyle='#fff';
    ctx.fillText(d.txt,d.x,d.y);
  }
  ctx.globalAlpha=1;

  ctx.restore();

  // hit flash
  if(g.flash>0){ ctx.fillStyle='rgba(255,60,80,'+(g.flash/8*0.3)+')'; ctx.fillRect(0,0,W,H); }
}

// ---------- HUD ----------
function updateHUD(){
  const g=game,p=g.player;
  document.getElementById('xpFill').style.width=(p.xp/p.next*100)+'%';
  document.getElementById('hpFill').style.width=(p.hp/p.maxhp*100)+'%';
  document.getElementById('lvlTag').textContent='Lv '+p.lvl;
  document.getElementById('killTag').textContent='击杀 '+p.kills;
  const sec=Math.floor(g.t/60);
  document.getElementById('timeTag').textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
}

// ---------- loop ----------
function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ---------- screens ----------
function startGame(){
  game=newGame();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('pauseScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  document.getElementById('joyHint').classList.remove('hidden');
}
function togglePause(){
  const g=game; if(!g||!g.running) return;
  // ignore while the level-up screen is open
  if(!document.getElementById('levelScreen').classList.contains('hidden')) return;
  g.paused=!g.paused;
  document.getElementById('pauseScreen').classList.toggle('hidden', !g.paused);
}
function quitToMenu(){
  if(game) game.running=false;
  document.getElementById('pauseScreen').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');
  document.getElementById('joyHint').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}
function gameOver(){
  const g=game; g.running=false;
  document.getElementById('pauseBtn').classList.add('hidden');
  const sec=Math.floor(g.t/60);
  document.getElementById('overStats').innerHTML=
    `存活时间 <b>${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}</b><br>`+
    `等级 <b>${g.player.lvl}</b> · 击杀 <b>${g.player.kills}</b>`;
  document.getElementById('overScreen').classList.remove('hidden');
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('pauseBtn').onclick=togglePause;
document.getElementById('resumeBtn').onclick=togglePause;
document.getElementById('quitBtn').onclick=quitToMenu;

loop();
})();
</script>
